services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chat-robot-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: docker
      RUNTIME_MODE: mock
      LLM_MODEL_PATH: /models/Qwen3-8B
      INTENT_MODEL_PATH: /models/Qwen2.5-1.5B-Instruct
      EMBEDDING_MODEL_PATH: /models/bge-m3
      RERANKER_MODEL_PATH: /models/bge-reranker-v2-m3
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: chat_robot
      POSTGRES_USER: chat_robot
      POSTGRES_PASSWORD: chat_robot
      POSTGRES_DSN: postgresql+psycopg://chat_robot:chat_robot@postgres:5432/chat_robot
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ${HOST_MODEL_ROOT:-/root/models}:/models:ro
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:17
    container_name: chat-robot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: chat_robot
      POSTGRES_USER: chat_robot
      POSTGRES_PASSWORD: chat_robot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat_robot -d chat_robot"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: chat-robot-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
