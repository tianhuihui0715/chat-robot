[app]
name = "Chat Robot"
env = "dev"
log_level = "INFO"
api_prefix = "/api/v1"

[runtime]
mode = "mock"
inference_mode = "mock"
inference_service_url = "http://localhost:8001"
inference_timeout_seconds = 60

[observability]
trace_store_dsn = "sqlite:///./data/chat_robot.db"
langsmith_enabled = false
langsmith_project = "chat-robot"
langsmith_endpoint = "https://api.smith.langchain.com"

[database]
host = "postgres"
port = 5432
name = "chat_robot"
user = "chat_robot"
password = "chat_robot"
dsn = "postgresql+psycopg://chat_robot:chat_robot@postgres:5432/chat_robot"

[vector_store]
qdrant_url = "http://qdrant:6333"

[object_store]
endpoint = "minio:9000"
access_key = "minioadmin"
secret_key = "minioadmin"
secure = false
bucket = "chat-robot"
